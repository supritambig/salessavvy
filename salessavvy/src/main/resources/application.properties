spring.application.name=salessavvy
server.port=9090

# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://mysql-service:3306/sales_savvy?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ── Security ──────────────────────────────────────────────────────────────────
spring.security.enabled=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=your-very-long-secure-secret-key-for-production-12345678901234567890
jwt.expiration=3600000

# ── CORS (frontend is served from same origin in production) ──────────────────
spring.web.cors.allowed-origins=http://localhost:9090
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=Content-Type,Authorization
spring.web.cors.allow-credentials=true

# ── Razorpay ──────────────────────────────────────────────────────────────────
razorpay.key_id=rzp_test_LqWBBDbgwot5lh
razorpay.key_secret=NETk6HP1NzRzufOYZ7KYfDMb

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.root=INFO
logging.level.org.springframework.web=INFO
